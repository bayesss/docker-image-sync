name: Sync Docker Images to Aliyun ACR
run-name: ${{ github.actor }} is syncing Docker images
on:
  push:
    branches:
      - main
    paths:
      - 'images.txt'
      - 'sync.sh'
      - '.github/workflows/sync.yaml'
  workflow_dispatch:

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to Aliyun Container Registry (ACR)
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Login to second Aliyun Container Registry (ACR)
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY2 }}
          username: ${{ secrets.ACR_USERNAME2 }}
          password: ${{ secrets.ACR_PASSWORD2 }}

      - name: Execute sync script
        run: bash "${{ github.workspace }}/sync.sh"
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_REGISTRY2: ${{ secrets.ACR_REGISTRY2 }}
          ACR_NAMESPACE2: ${{ secrets.ACR_NAMESPACE2 }}
          DIGEST_PARALLELISM: "14"
          SYNC_PARALLELISM: "3"
          DOCKER_PLATFORM: linux/amd64

      - name: Job status
        run: echo "This job's status is ${{ job.status }}"
